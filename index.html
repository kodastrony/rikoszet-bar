<!doctype html>
<html lang="pl" class="intro-scroll">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>RIKOSZET — Bar & Klub Gier · Wrocław</title>
  <meta name="description" content="Bilard, rzutki, karaoke i scena w starej rozlewni przy Słodowej 8. Zajrzyj do środka w 3D i zarezerwuj stół, tor albo salkę na urodziny." />
  <meta name="theme-color" content="#10231b" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <meta property="og:title" content="RIKOSZET — Bar & Klub Gier" />
  <meta property="og:description" content="Bilard, rzutki, karaoke i dobre piwo pod jednym dachem starej rozlewni. Zajrzyj do środka w 3D." />
  <style>
    /* krytyczny stan startowy: splash widoczny od pierwszej klatki */
    html, body { margin: 0; background: #10231b; }
    #splash {
      position: fixed; inset: 0; z-index: 96;
      display: grid; place-items: center;
      background: radial-gradient(120% 90% at 50% 20%, #1c4434 0%, #10231b 62%, #0b1a14 100%);
      font-family: system-ui, sans-serif;
      transition: opacity 0.3s linear;
    }
    #splash .splash-inner { text-align: center; color: #f2e9d6; padding: 24px; }
    #splash .splash-name { margin: 16px 0 2px; font-size: clamp(52px, 9vw, 96px); font-weight: 800; letter-spacing: 0.05em; line-height: 1; }
    #splash .splash-tag { margin: 0; font-size: 13px; font-weight: 700; letter-spacing: 0.4em; text-transform: uppercase; color: #e3a93c; }
    #splash .splash-claim { margin: 22px auto 0; max-width: 420px; font-size: 15.5px; line-height: 1.6; color: #cfd8c8; }
    #splash .splash-scroll { margin-top: 52px; display: inline-flex; align-items: center; gap: 12px; font-size: 12px; font-weight: 650; letter-spacing: 0.14em; text-transform: uppercase; color: #9fb3a3; }
  </style>
</head>
<body class="introing">
  <div id="app" aria-hidden="true"></div>
  <div id="labels"></div>
  <div id="ui"></div>

  <div id="scroll-space" aria-hidden="true"></div>
  <div id="story">
    <div class="splash" id="splash">
      <div class="splash-inner">
        <svg viewBox="0 0 40 40" class="logo-mark" width="72" height="72" aria-hidden="true">
          <circle cx="20" cy="20" r="18.5" fill="#10231b"/>
          <circle cx="20" cy="20" r="18.5" fill="none" stroke="#e3a93c" stroke-width="2.2"/>
          <circle cx="20" cy="15.4" r="8.6" fill="#f2e9d6"/>
          <text x="20" y="19.8" font-size="12.5" font-weight="800" text-anchor="middle" fill="#10231b" font-family="'Bricolage Grotesque Variable',sans-serif">8</text>
        </svg>
        <h1 class="splash-name">RIKOSZET</h1>
        <p class="splash-tag">Bar &amp; Klub Gier</p>
        <p class="splash-claim">Bilard, rzutki i karaoke pod jednym dachem starej rozlewni.</p>
        <div class="splash-scroll"><span class="ss-mouse"><i></i></span> przewiń, aby poznać historię</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
